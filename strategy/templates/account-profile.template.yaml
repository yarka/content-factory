# Copy to strategy/accounts/<account-slug>/account-profile.yaml

account_slug: your-account-slug
business_name: Your Business Name
business_category: founder operating systems and AI orchestration
primary_platform: LinkedIn
goal_type: trust_and_audience

audience:
  primary_icp: founders with digital products using personal brand for distribution
  secondary_icp: founder-led B2B operators, consultants, and AI builders
  pains:
    - inconsistent demand from personal brand
    - founder context trapped in the founder's head
    - unclear system for content, distribution, and execution
  desired_outcomes:
    - brand_to_demand system
    - founder_os_audit
    - trusted systems partner shortlist

offer_ladder:
  - stage: lead_magnet
    offer: Founder OS / AI Orchestration Audit call
    desired_action: book a call
  - stage: paid_offer
    offer: Founder systems and brand-to-demand implementation
    desired_action: start a paid project

lead_magnet:
  name: 30-minute Founder OS / AI Orchestration Audit
  call_to_action: soft invitation after trust is built

proof_assets:
  - type: case_study
    title: Example transformation
    summary: Replace with proof, outcomes, or frameworks.
    link: ""
  - type: founder_story
    title: Personal operating lesson
    summary: Replace with your most credible story asset.
    link: ""

positioning_seed:
  systems_orchestrator_identity: Founder Systems Orchestrator
  orchestration_architect_identity: AI Orchestration Architect for Founders
  founder_background: Replace with the operating, engineering, or scaling background that makes this account credible.
  unfair_advantages:
    - Replace with your strongest operating advantage
    - Replace with your strongest technical or domain advantage
  public_proof_points:
    - Replace with one specific public proof point
    - Replace with another public proof point
  entry_promise: Turn personal brand into demand through systems, clarity, and execution architecture.

worldview_and_values:
  mission: Replace with the change you want your work and content to create.
  values:
    - Replace with one value that should shape content and consulting
    - Replace with another value that should shape content and consulting
  change_philosophy: Replace with how you believe AI adoption should happen inside a business.

tone_constraints:
  desired_traits:
    - direct
    - practical
    - trust-building
  avoid:
    - hype
    - hard-sell CTA
    - generic AI cliches

manual_context_sources:
  - type: notes
    location: strategy/accounts/<account-slug>/manual-context.md
    note: Optional extra context, competitor notes, UVP, or reference posts.

strategy_defaults:
  posting_cadence_per_week: 2_to_3
  artifact_or_video_posts_per_week: 1
  pillar_count_target: 5
  auto_discovery_enabled: true
  refresh_mode: manual
